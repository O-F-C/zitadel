networks:
  zitadel-net:

services:
  traefik:
    image: traefik:v3.6        # ggf. pinnen/prüfen, siehe Token-Hinweis oben
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=zitadel-net"
      - "--entrypoints.websecure.address=:443"
      # web-Entrypoint + Redirect komplett raus
      - "--certificatesresolvers.hetzner.acme.dnschallenge=true"
      - "--certificatesresolvers.hetzner.acme.dnschallenge.provider=hetzner"
      - "--certificatesresolvers.hetzner.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.hetzner.acme.email=admin@oltmer-food-consulting.de"
      - "--certificatesresolvers.hetzner.acme.storage=/letsencrypt/acme.json"
    environment:
      - HETZNER_API_TOKEN=${HETZNER_DNS_TOKEN}    # DNS-Console-Token
    ports:
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt              # acme.json muss chmod 600 sein
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - zitadel-net

  init-login-client:
    image: alpine:3
    command: ["sh", "-c", "chown -R 1000:1000 /login-client && chmod 770 /login-client"]
    volumes:
      - login-client:/login-client
    restart: "no"

  zitadel:
    image: ${IMAGE_ZITADEL:-ghcr.io/o-f-c/zitadel:latest}
    restart: unless-stopped
    command: 'start-from-init --masterkey "${ZITADEL_MASTERKEY}"'
    depends_on:
      init-login-client:
        condition: service_completed_successfully
    environment:
      # --- Proxy / Domain ---
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN}
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: true
      ZITADEL_TLS_ENABLED: false        # TLS macht Caddy
      # --- DB: euer externes HA-Cluster (DSN überschreibt Einzelfelder) ---
      ZITADEL_DATABASE_POSTGRES_DSN: "postgresql://zitadel:${ZITADEL_DB_PASSWORD}@10.209.0.7:5432,10.209.0.8:5432,10.209.0.9:5432/zitadel?target_session_attrs=read-write&sslmode=disable"
      ZITADEL_DATABASE_POSTGRES_ADMIN_DSN: "postgresql://zitadel:${ZITADEL_DB_PASSWORD}@10.209.0.7:5432,10.209.0.8:5432,10.209.0.9:5432/postgres?target_session_attrs=read-write&sslmode=disable"
      # --- Login V2 Client bootstrap ---
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /login-client/pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: '2030-01-01T00:00:00Z'
    volumes:
      - login-client:/login-client
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - zitadel-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=zitadel-net"
      - "traefik.http.routers.zitadel.rule=Host(`auth.oltmer-food-consulting.de`) && !PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel.entrypoints=websecure"
      - "traefik.http.routers.zitadel.tls.certresolver=hetzner"
      # Wildcard-Cert hier einmal deklarieren:
      - "traefik.http.routers.zitadel.tls.domains[0].main=auth.oltmer-food-consulting.de"
      # >>> der entscheidende Teil: h2c statt http <
      - "traefik.http.services.zitadel.loadbalancer.server.scheme=h2c"
      - "traefik.http.services.zitadel.loadbalancer.server.port=8080"
      - "traefik.http.services.zitadel.loadbalancer.passhostheader=true"

  login:
    image: ${IMAGE_LOGIN:-ghcr.io/o-f-c/zitadel-login:latest}
    restart: unless-stopped
    # Run as root (like upstream deploy/compose) so the login client can read the
    # bootstrap PAT regardless of the /login-client dir perms set by
    # init-login-client (chmod 770, owner 1000:1000) vs the image's uid 1001.
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /login-client/pat
      CUSTOM_REQUEST_HEADERS: Host:${ZITADEL_DOMAIN}
    depends_on:
      zitadel:
        condition: service_healthy
    volumes:
      - login-client:/login-client
    networks:
      - zitadel-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=zitadel-net"
      - "traefik.http.routers.zitadel-login.rule=Host(`auth.oltmer-food-consulting.de`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel-login.entrypoints=websecure"
      - "traefik.http.routers.zitadel-login.tls.certresolver=hetzner"
      - "traefik.http.routers.zitadel-login.priority=20"      # gewinnt für /ui/v2/login
      # Login ist ein normaler Next.js-HTTP-Service -> kein h2c
      - "traefik.http.services.zitadel-login.loadbalancer.server.port=3000"
      - "traefik.http.services.zitadel-login.loadbalancer.passhostheader=true"

volumes:
  login-client:
